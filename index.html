/* -------- Scroll reveal hook -------- */
function useReveal() {
  useEffect(() => {
    const els = document.querySelectorAll(".reveal");
    const io = new IntersectionObserver((entries) => {
      entries.forEach((e) => {
        if (e.isIntersecting) {
          e.target.classList.add("in");
          io.unobserve(e.target);
        }
      });
    }, { threshold: 0.14, rootMargin: "0px 0px -40px 0px" });
    els.forEach((el) => io.observe(el));
    return () => io.disconnect();
  }, []);
}

function Navbar({ tweaks }) {
  const [scrolled, setScrolled] = useState(false);
  const [active, setActive] = useState("inicio");
  const [open, setOpen] = useState(false);

  useEffect(() => {
    const onScroll = () => {
      setScrolled(window.scrollY > 12);
      // Active section: use midpoint of viewport so the highlighted link
      // matches what the user is actually looking at.
      const y = window.scrollY + window.innerHeight * 0.4;
      let curr = NAV_SECTIONS[0].id;
      for (const s of NAV_SECTIONS) {
        const el = document.getElementById(s.id);
        if (el && el.offsetTop <= y) curr = s.id;
      }
      setActive(curr);
    };
    onScroll();
    window.addEventListener("scroll", onScroll, { passive: true });
    return () => window.removeEventListener("scroll", onScroll);
  }, []);

  const go = (e, id) => {
    e.preventDefault();
    setOpen(false);
    const el = document.getElementById(id);
    if (el) el.scrollIntoView({ behavior: "smooth", block: "start" });
  };

  return (
    <nav className={`nav ${scrolled ? "scrolled" : ""}`}>
      <div className="nav-inner">
        <a href="#inicio" className="nav-brand" onClick={(e) => go(e, "inicio")}>
          <span className="nav-brand-mark">M</span>
          <span>Marco Ango</span>
        </a>
        <div className={`nav-links ${open ? "mobile-open" : ""}`}>
          {NAV_SECTIONS.slice(0, 6).map((s) =>
          <a key={s.id} href={`#${s.id}`}
          className={`nav-link ${active === s.id ? "active" : ""}`}
          onClick={(e) => go(e, s.id)}>
              {s.label}
            </a>
          )}
        </div>
        <a href="#contacto" className="btn btn-primary nav-cta" onClick={(e) => go(e, "contacto")}>
          Contactar <Icon.Arrow />
        </a>
        <button className="nav-toggle" onClick={() => setOpen((o) => !o)} aria-label="Menú">
          {open ? <Icon.Close /> : <Icon.Menu />}
        </button>
      </div>
    </nav>);

}

/* -------- Project Modal -------- */
function ProjectModal({ project, onClose }) {
  useEffect(() => {
    if (!project) return;
    const onKey = (e) => e.key === "Escape" && onClose();
    document.addEventListener("keydown", onKey);
    document.body.style.overflow = "hidden";
    return () => {
      document.removeEventListener("keydown", onKey);
      document.body.style.overflow = "";
    };
  }, [project, onClose]);

  return (
    <div className={`modal-backdrop ${project ? "open" : ""}`} onClick={onClose}>
      {project &&
      <div className="modal" onClick={(e) => e.stopPropagation()}>
          <div className="modal-hero">
            <project.Preview />
            <button className="modal-close" onClick={onClose} aria-label="Cerrar">
              <Icon.Close style={{ width: 16, height: 16 }} />
            </button>
          </div>
          <div className="modal-body">
            <div className="modal-eyebrow">{project.chip}</div>
            <h3>{project.title}</h3>
            {project.paragraphs.map((p, i) => <p key={i}>{p}</p>)}
            <div className="modal-stats">
              {project.stats.map((s, i) =>
            <div key={i}>
                  <div className="v">{s.v}</div>
                  <div className="l">{s.l}</div>
                </div>
            )}
            </div>
            <div style={{ fontSize: 13, color: 'var(--text-3)', textTransform: 'uppercase', letterSpacing: '0.1em', fontWeight: 600, marginBottom: 8 }}>Herramientas</div>
            <div className="modal-tools">
              {project.tools.map((t) => <span key={t}>{t}</span>)}
            </div>
          </div>
        </div>
      }
    </div>);

}

/* -------- Tweaks -------- */
const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "primary": "#174A5B",
  "accent": "#F39C12",
  "density": "comfortable"
} /*EDITMODE-END*/;

function PortfolioTweaks() {
  const [tweaks, setTweaks] = useTweaks(TWEAK_DEFAULTS);

  useEffect(() => {
    const root = document.documentElement;
    root.style.setProperty("--primary", tweaks.primary);
    // Derive dark variant
    const darker = (hex) => {
      const n = parseInt(hex.slice(1), 16);
      const r = Math.max(0, (n >> 16 & 255) - 30);
      const g = Math.max(0, (n >> 8 & 255) - 30);
      const b = Math.max(0, (n & 255) - 30);
      return `#${(r << 16 | g << 8 | b).toString(16).padStart(6, "0")}`;
    };
    root.style.setProperty("--primary-dark", darker(tweaks.primary));
    root.style.setProperty("--accent", tweaks.accent);
  }, [tweaks.primary, tweaks.accent]);

  return (
    <TweaksPanel title="Tweaks">
      <TweakSection title="Color primario">
        <TweakColor
          label="Primary"
          value={tweaks.primary}
          onChange={(v) => setTweaks({ primary: v })}
          presets={["#174A5B", "#1E3A8A", "#065F46", "#7C2D12", "#111827"]} />
        
        <TweakColor
          label="Accent"
          value={tweaks.accent}
          onChange={(v) => setTweaks({ accent: v })}
          presets={["#F39C12", "#EAB308", "#EF4444", "#8B5CF6", "#0EA5E9"]} />
        
      </TweakSection>
    </TweaksPanel>);

}
